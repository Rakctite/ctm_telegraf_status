[agent]
  interval = "1s"
  flush_interval = "1s"
  omit_hostname = true

[[inputs.file]]
  files = ["/work/tests/fixtures/status.json"]
  name_override = "mqtt_consumer"
  data_format = "json"
  json_string_fields = ["*"]

  [inputs.file.tags]
    line_code = "LO054"
    equip_name = "MC02"
    station = "1"
    sensor_code = "Temp_ST01_PL01"
    status_suffix = "status"

[[processors.execd]]
  namepass = ["mqtt_consumer"]
  command = ["python3", "-u", "/telegraf/telegraf_py/mapping_processor.py"]

[[outputs.sql]]
  driver = "pgx"
  data_source_name = "postgres://admin:1q2w3e4r@ctm-status-postgres-test:5432/edge_hmi?sslmode=disable&search_path=core"
  name_override = "sensor_status"
  timestamp_column = "update_time"
