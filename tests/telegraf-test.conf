[agent]
  omit_hostname = true

[[inputs.file]]
  files = ["/work/tests/fixtures/status.json"]
  name_override = "mqtt_consumer"
  data_format = "json"
  json_string_fields = ["*"]

  [inputs.file.tags]
    line_code = "LO054"
    equip_name = "MC02"
    station = "1"
    sensor_code = "Temp_ST01_PL01"
    status_suffix = "status"

[[processors.execd]]
  namepass = ["mqtt_consumer"]
  command = ["python3", "-u", "/telegraf/telegraf_py/mapping_processor.py"]

[[outputs.file]]
  files = ["stdout"]
  data_format = "influx"
