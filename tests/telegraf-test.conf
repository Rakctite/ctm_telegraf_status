[agent]
  omit_hostname = true

[[inputs.file]]
  files = ["/work/tests/fixtures/status.json"]
  data_format = "json_v2"

  [[inputs.file.json_v2]]
    measurement_name = "mqtt_consumer"

    [[inputs.file.json_v2.object]]
      path = "sensors"
      timestamp_key = "update_time"
      timestamp_format = "2006-01-02 15:04:05.000-07"
      disable_prepend_keys = true
      included_keys = [
        "sensor_id",
        "conn_status",
        "last_seen",
        "health_score",
        "error_msg",
        "update_time",
      ]

      [inputs.file.json_v2.object.fields]
        sensor_id = "int"
        conn_status = "string"
        last_seen = "string"
        health_score = "float"
        error_msg = "string"

[[processors.execd]]
  namepass = ["mqtt_consumer"]
  command = ["python3", "-u", "/telegraf/telegraf_py/mapping_processor.py"]

[[outputs.file]]
  files = ["stdout"]
  data_format = "influx"
