[agent]
  omit_hostname = true

[[inputs.file]]
  files = ["/work/tests/fixtures/status.json"]
  data_format = "json_v2"

  [[inputs.file.json_v2]]
    measurement_name = "mqtt_consumer"

    [[inputs.file.json_v2.object]]
      path = "sensors"
      disable_prepend_keys = true
      included_keys = [
        "sensor_code",
        "conn_status",
        "last_seen",
        "health_score",
        "error_msg",
        "update_time",
      ]

      [inputs.file.json_v2.object.fields]
        sensor_code = "string"
        conn_status = "string"
        last_seen = "string"
        health_score = "float"
        error_msg = "string"
        update_time = "string"

  [inputs.file.tags]
    line_code = "LO054"
    equip_name = "MC02"
    station = "1"
    source = "iot_temp"
    status_suffix = "status"

[[processors.execd]]
  namepass = ["mqtt_consumer"]
  command = ["python3", "-u", "/telegraf/telegraf_py/mapping_processor.py"]

[[outputs.file]]
  files = ["stdout"]
  data_format = "influx"
