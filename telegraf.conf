[agent]
  metric_batch_size = 5000
  metric_buffer_limit = 100000
  interval = "1s"
  round_interval = true
  flush_interval = "5s"
  omit_hostname = true
  debug = false

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["C-S/+/+/+/+/+/+/+/status"]
  qos = 1
  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "mqtt_consumer"

    [[inputs.mqtt_consumer.json_v2.object]]
      path = "sensors"
      disable_prepend_keys = true
      included_keys = [
        "sensor_code",
        "conn_status",
        "last_seen",
        "health_score",
        "error_msg",
        "update_time",
      ]

      [inputs.mqtt_consumer.json_v2.object.fields]
        sensor_code = "string"
        conn_status = "string"
        last_seen = "string"
        health_score = "float"
        error_msg = "string"
        update_time = "string"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "C-S/+/+/+/+/+/+/+/status"
    tags = "_/_/_/_/line_code/equip_name/station/source/status_suffix"

[[processors.execd]]
  namepass = ["mqtt_consumer"]
  command = ["python3", "-u", "/telegraf/telegraf_py/mapping_processor.py"]
  restart_delay = "10s"

[[outputs.sql]]
  driver = "pgx"
  data_source_name = "postgres://admin:1q2w3e4r@hmi-db-postgres:5432/edge_hmi?sslmode=disable&search_path=core"
  name_override = "sensor_status"
  timestamp_column = "update_time"
